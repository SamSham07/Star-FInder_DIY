<style>
  :root {
    /* BRIGHT theme — coral pink, sky blue, amber, cream */
    /* navy-* names retained for compatibility; values now represent LIGHT backgrounds */
    --navy-0: #FFFCF7;        /* page outer bg */
    --navy-1: #FFFFFF;        /* primary surface */
    --navy-2: #FFF8E7;        /* soft cream surface */
    --navy-3: #2DA7D7;        /* sky-blue deep (was steel) */
    --blue-1: #6ECFF5;        /* sky-blue light */
    --blue-soft: #E0F4FC;
    --blue-deep: #2DA7D7;
    --gold: #F7C948;          /* amber yellow */
    --gold-deep: #FFC928;
    --sparkle: #F7C948;
    --cream: #1a2845;         /* INK — now used as text-on-light */
    --cream-soft: #4a5b7a;
    --ink-mute: rgba(26,40,69,0.55);
    --pink: #FF6B9D;          /* coral pink */
    --pink-light: #FFB3C9;
    --mint: #A8E6CF;
    --orange-1: #EE4D2D;      /* Shopee orange */
    --orange-2: #FF6347;
    --gold-text: #8B6B00;    /* accessible amber for text on light bg — 5.3:1 on white, passes WCAG AA */
    --bg-cream: #FFF8E7;
    --line: rgba(26,40,69,0.10);
    --line-strong: rgba(26,40,69,0.20);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--navy-1);
    color: var(--cream);
    font-family: 'Noto Sans SC', 'PingFang SC', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: clip;
  }
  body { min-height: 100vh; }
  .display { font-family: 'Bricolage Grotesque', 'Noto Sans SC', sans-serif; font-weight: 800; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  ::selection { background: var(--gold); color: var(--navy-1); }

  /* Custom cursor trail container */
  .cursor-star {
    position: fixed;
    pointer-events: none;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, rgba(255,215,0,0.6) 50%, transparent 70%);
    box-shadow: 0 0 8px rgba(255,215,0,0.8);
    z-index: 9990;
    animation: fadeTrail 1.2s ease-out forwards;
  }
  @keyframes fadeTrail {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.2) translateY(-30px); }
  }

  /* Dark starry wrapper — flip semantic color vars so all children render light-on-dark */
  .starry-wrap {
    --navy-0: #0a1420;
    --navy-1: #0f1d30;
    --navy-2: #142640;
    --navy-3: #2DA7D7;
    --bg-cream: #111d33;
    --cream: #FFFACD;
    --cream-soft: rgba(255,250,205,0.7);
    --ink-mute: rgba(255,250,205,0.45);
    --line: rgba(255,250,205,0.10);
    --line-strong: rgba(255,250,205,0.18);
    color: #FFFACD;
    --gold-text: var(--gold);  /* on dark bg standard gold #F7C948 passes contrast */
  }
  .starry-wrap .glass {
    background: rgba(15,29,48,0.75);
    border-color: rgba(255,250,205,0.12);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  /* twinkle keyframes for stars */
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  @keyframes drift {
    0% { transform: translate(0, 0); }
    50% { transform: translate(8px, -6px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes spinSlow { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
  @keyframes meteorFly {
    0% { transform: translate(0,0) rotate(var(--angle, -25deg)); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translate(var(--dx, 600px), var(--dy, 400px)) rotate(var(--angle, -25deg)); opacity: 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes floatMascot {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }
  @keyframes floatShadow {
    0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.4; }
    50% { transform: translateX(-50%) scaleX(0.8); opacity: 0.22; }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,183,3,0.5); }
    50% { box-shadow: 0 0 0 18px rgba(255,183,3,0); }
  }
  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  @keyframes wavyMove {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-12px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  /* utility */
  .wave-divider svg { display: block; width: 100%; height: 80px; }
  .glass {
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line-strong);
    box-shadow: 0 10px 30px rgba(26,40,69,0.06);
  }
  /* M3: focus ring for celestial interactive objects */
  [data-celestial-id]:focus-visible { outline: 3px solid #F7C948; outline-offset: 6px; border-radius: 50%; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; }

  /* scrollbar */
  html { scrollbar-width: none; -ms-overflow-style: none; }
  ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }

  /* ===== Mobile responsive overrides ===== */
  @media (max-width: 760px) {
    /* map: hide iframe on mobile (Looker Studio doesn't scale), show fallback link */
    .map-iframe-wrap { display: none !important; }
    .map-mobile-link { display: flex !important; }

    /* story section: text on top, photo at bottom */
    .story-text  { order: 1; }
    .story-photo { order: 2; }

    /* header: shrink oversized logo + tighten bar on phones */
    .site-header { padding: 12px 18px !important; }
    .hdr-logo { width: 52px !important; height: 52px !important; }
    /* timeline prev/next: compact so long Malay labels don't overflow */
    .tl-nav-btn { padding: 9px 12px !important; font-size: 12px !important; }
    /* founders: stack to single column on mobile, leave room for the character above each card */
    /* M1: row-gap increased so character images (≤250px) fit between stacked cards */
    .founders-grid { grid-template-columns: 1fr !important; max-width: 420px !important; row-gap: 180px !important; margin-top: 180px !important; }
    /* two-column layouts stack vertically */
    .r-stack { grid-template-columns: 1fr !important; gap: 32px !important; }
    /* stats grid on mobile: very tight gap when stacked */
    .stats-grid { gap: 4px !important; }
    .stats-mascot { min-height: auto !important; height: auto !important; width: auto !important; }
    .stats-mascot img { width: 160px !important; margin-top: 0 !important; margin-bottom: -20px !important; }
    .stats-grid > div:first-child { padding-top: 16px !important; padding-bottom: 12px !important; }
    /* four-up grids become two-up */
    .r-2col { grid-template-columns: repeat(2, 1fr) !important; }
    /* gallery masonry: 4 cols -> 2 */
    .r-gallery { column-count: 2 !important; }
    /* footer 3-col -> 1 */
    .r-footer { grid-template-columns: 1fr !important; gap: 36px !important; }
    /* reduce big vertical section padding on phones */
    .r-section { padding-left: 20px !important; padding-right: 20px !important; }
    /* timeline rail: hide per-dot titles (active title shows in detail card), tighten gap */
    .r-tl-title { display: none !important; }
    .r-tl-rail { gap: 6px !important; padding: 0 2% !important; }
  }
  @media (max-width: 460px) {
    .r-2col { grid-template-columns: 1fr 1fr !important; }
  }
  /* Minor m1: respect prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .cursor-star { display: none !important; }
  }

  /* ===== Pixel box design — CTA buttons only (font/colors stay Classic) ===== */
  body .pixel-cta {
    border-radius: 0 !important;                 /* square pixel corners */
    border: 3px solid #1a2845 !important;        /* chunky outline */
    box-shadow: 4px 4px 0 #1a2845 !important;    /* hard offset shadow */
    animation: none !important;                   /* drop the glow pulse */
    transition: transform .08s steps(2), box-shadow .08s steps(2) !important;
  }
  body .pixel-cta:hover {
    transform: translate(2px, 2px) !important;
    box-shadow: 2px 2px 0 #1a2845 !important;
  }
  body .pixel-cta:active {
    transform: translate(4px, 4px) !important;
    box-shadow: 0 0 0 #1a2845 !important;
  }

  /* ===== Coral Cruiser rocket cursor — hero + footer ===== */
  .rocket-cursor, .rocket-cursor * { cursor: none !important; }
  #rocket-cursor {
    position: fixed; left: 0; top: 0; width: 34px; height: 34px;
    margin: -17px 0 0 -17px; pointer-events: none; z-index: 99999;
    opacity: 0; transition: opacity .14s; will-change: transform;
  }
  .rocket-smoke {
    position: fixed; pointer-events: none; z-index: 99998;
    border-radius: 50%; filter: blur(2px); will-change: transform, opacity;
  }
  @media (hover: none), (pointer: coarse), (prefers-reduced-motion: reduce) {
    .rocket-cursor, .rocket-cursor * { cursor: auto !important; }
    #rocket-cursor { display: none !important; }
  }
</style>

<!-- Coral Cruiser rocket cursor (hero + footer only) -->
<div id="rocket-cursor" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34">
    <defs>
      <linearGradient id="rc-body" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FFE3EC"/></linearGradient>
      <linearGradient id="rc-flame" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFC928"/><stop offset="1" stop-color="#FF8A3C"/></linearGradient>
    </defs>

    <path d="M17 30 C15.6 27.7,15.6 26,17 24.7 C18.4 26,18.4 27.7,17 30 Z" fill="#FFF3D6"/>
    <path d="M11 19 C7.5 21,7 24.5,8.5 26 C10 24.5,12 23,12.5 22 Z" fill="#FF6B9D"/>
    <path d="M23 19 C26.5 21,27 24.5,25.5 26 C24 24.5,22 23,21.5 22 Z" fill="#FF6B9D"/>
    <path d="M17 1 C23 6,24 14,22 23 L12 23 C10 14,11 6,17 1 Z" fill="url(#rc-body)" stroke="#FF6B9D" stroke-width="1.4"/>
    <circle cx="17" cy="11.5" r="3.6" fill="#6ECFF5" stroke="#2DA7D7" stroke-width="1.3"/>
    <circle cx="15.8" cy="10.3" r="1.1" fill="#EAFBFF"/>
  </svg>
</div>
<script>
(function () {
  var fine = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!fine || reduce) return;

  var rk = document.getElementById('rocket-cursor');
  var mx = -200, my = -200, x = -200, y = -200, ang = 0, dist = 0, over = false;

  function zones() { return document.querySelectorAll('.rocket-cursor'); }
  function inZone(t) { return !!(t && t.closest && t.closest('.rocket-cursor')); }

  document.addEventListener('mousemove', function (e) {
    mx = e.clientX; my = e.clientY;
    var now = inZone(e.target);
    if (now && !over) { over = true; rk.style.opacity = '1'; x = mx; y = my; }
    else if (!now && over) { over = false; rk.style.opacity = '0'; }
  }, { passive: true });
  document.addEventListener('mouseleave', function () { over = false; rk.style.opacity = '0'; });

  function smoke(sx, sy) {
    var s = 6 + Math.random() * 6;
    var p = document.createElement('div');
    p.className = 'rocket-smoke';
    p.style.left = sx + 'px'; p.style.top = sy + 'px';
    p.style.width = s + 'px'; p.style.height = s + 'px';
    p.style.marginLeft = (-s / 2) + 'px'; p.style.marginTop = (-s / 2) + 'px';
    p.style.background = 'rgba(223,230,255,' + (0.4 + Math.random() * 0.3).toFixed(2) + ')';
    document.body.appendChild(p);
    requestAnimationFrame(function () {
      p.style.transition = 'transform 820ms ease-out, opacity 820ms ease-out';
      p.style.opacity = '0';
      p.style.transform = 'translateY(7px) scale(2.4)';
    });
    setTimeout(function () { p.remove(); }, 880);
  }

  function loop() {
    x += (mx - x) * 0.32; y += (my - y) * 0.32;
    var dx = mx - x, dy = my - y;
    if (Math.hypot(dx, dy) > 0.5) {
      var t = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      var d = ((t - ang + 540) % 360) - 180;
      ang += d * 0.3;
    }
    rk.style.transform = 'translate(' + x + 'px,' + y + 'px) rotate(' + ang + 'deg)';
    if (over) {
      dist += Math.hypot(mx - x, my - y);
      if (dist > 13) {
        dist = 0;
        var rad = (ang - 90) * Math.PI / 180;
        smoke(x - Math.cos(rad) * 15, y - Math.sin(rad) * 15);
      }
    }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
